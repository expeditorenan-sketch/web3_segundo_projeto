<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo MVP - Web3 Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h1 { color: #2c3e50; text-align: center; font-size: 24px; }
        .status { background: #e8f4fd; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; word-break: break-all; }
        button { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-connect { background: #3498db; color: white; }
        .btn-mint { background: #9b59b6; color: white; }
        .btn-stake { background: #27ae60; color: white; }
        .btn-vote { background: #e67e22; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        .console { background: #2c3e50; color: #27ae60; padding: 15px; border-radius: 8px; font-family: monospace; height: 100px; overflow-y: auto; margin-top: 20px; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🚀 Protocolo Web3 MVP</h1>
    
    <div id="status" class="status">Status: Carteira não conectada</div>

    <button class="btn-connect" onclick="conectar()">1. Conectar MetaMask</button>
    <button class="btn-mint" onclick="executarMint()">2. Mintar Badge (NFT)</button>
    <button class="btn-stake" onclick="executarStake()">3. Fazer Stake (10 Tokens)</button>
    <button class="btn-vote" onclick="executarVoto()">4. Votar na DAO</button>

    <div class="console" id="log">Aguardando interação...</div>
</div>

<script>
    // CONFIGURAÇÕES
    const ADDR_TOKEN = "0x758b9a473B5F33a582e914a49a6589E49435e4f7";
    const ADDR_NFT = "0x5b824cbb33Fc798c600Bf8F39427392b0A843DF5";
    const ADDR_STAKING = "0x2E3bA6C4374BD668A011254e4ec25775c9C8F84B";

    const ABI_TOKEN = ["function approve(address spender, uint256 amount) public returns (bool)", "function vote(uint256 propId, uint256 amount) public"];
    const ABI_NFT = ["function safeMint(address to) public"];
    const ABI_STAKING = ["function stake(uint256 amount) public"];

    let signer;

    function log(msg) {
        const div = document.getElementById('log');
        div.innerHTML += "<br>> " + msg;
        div.scrollTop = div.scrollHeight;
    }

    async function conectar() {
        if (typeof ethers === 'undefined') {
            alert("A biblioteca ethers não carregou.");
            return;
        }

        if (window.ethereum) {
            try {
                log("Iniciando conexão...");
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                const address = await signer.getAddress();
                document.getElementById('status').innerText = "Conectado: " + address;
                log("Conectado com sucesso!");
            } catch (error) {
                log("Erro na conexão: " + error.message);
            }
        } else {
            alert("MetaMask não detectada!");
        }
    } // A CHAVE EXTRA ESTAVA AQUI, AGORA ESTÁ CORRETO

    async function executarMint() {
        if (!signer) return alert("Conecte a carteira primeiro!");
        try {
            const contrato = new ethers.Contract(ADDR_NFT, ABI_NFT, signer);
            log("Enviando transação de Mint...");
            const tx = await contrato.safeMint(await signer.getAddress());
            log("Aguardando confirmação...");
            await tx.wait();
            log("NFT Mintado! Hash: " + tx.hash.substring(0,20) + "...");
        } catch (e) { log("Erro: " + e.message); }
    }

    async function executarStake() {
        if (!signer) return alert("Conecte a carteira primeiro!");
        try {
            const token = new ethers.Contract(ADDR_TOKEN, ABI_TOKEN, signer);
            const staking = new ethers.Contract(ADDR_STAKING, ABI_STAKING, signer);
            const valor = ethers.utils.parseUnits("10", 18);

            log("Passo 1: Aprovando 10 tokens...");
            const tx1 = await token.approve(ADDR_STAKING, valor);
            await tx1.wait();

            log("Passo 2: Realizando Stake...");
            const tx2 = await staking.stake(valor);
            await tx2.wait();
            log("Stake concluído com sucesso!");
        } catch (e) { log("Erro: " + e.message); }
    }

    async function executarVoto() {
        if (!signer) return alert("Conecte a carteira primeiro!");
        try {
            const token = new ethers.Contract(ADDR_TOKEN, ABI_TOKEN, signer);
            log("Votando na Proposta #1...");
            const tx = await token.vote(1, ethers.utils.parseUnits("5", 18));
            await tx.wait();
            log("Voto registrado com sucesso!");
        } catch (e) { log("Erro: " + e.message); }
    }
</script>

</body>
</html>
